<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bogotá Artística & Cultural — Mapa Interactivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    :root {
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dim:    #7a5f28;
      --ink:         #0c0b08;
      --parchment:   #1a1610;
      --parch-mid:   #221d14;
      --parch-light: #2e2618;
      --rust:        #8b3a2a;
      --teal:        #2a7a6f;
      --violet:      #5a3a7a;
      --cream:       #e8dfc0;
      --cream-dim:   #a09070;

      /* Categorías */
      --cat-cine:     #d4a017;
      --cat-teatro:   #c0392b;
      --cat-museo:    #2471a3;
      --cat-galeria:  #6c3483;
      --cat-danza:    #1e8449;
      --cat-musica:   #d35400;
      --cat-mixto:    #7d6608;

      --zone-chapinero: #c9a84c;
      --zone-usaquen:   #2a7a6f;
      --zone-kennedy:   #8b3a2a;

      --panel-w: 380px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--ink);
      color: var(--cream);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ─── PANTALLA DE CARGA ─────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--ink);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; }

    .loading-emblem {
      width: 120px; height: 120px;
      position: relative;
    }
    .loading-emblem svg {
      width: 100%; height: 100%;
      animation: emblem-spin 6s linear infinite;
    }
    @keyframes emblem-spin {
      to { transform: rotate(360deg); }
    }
    .loading-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-align: center;
    }
    .loading-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--cream-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .loading-bar-wrap {
      width: 260px; height: 3px;
      background: rgba(201,168,76,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-light), var(--gold-dim));
      background-size: 200% 100%;
      animation: bar-shimmer 1.4s linear infinite;
      width: 0%;
      transition: width 2s ease;
    }
    @keyframes bar-shimmer {
      to { background-position: 200% 0; }
    }

    /* ─── LAYOUT PRINCIPAL ──────────────────────────────── */
    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #app.visible { opacity: 1; }

    /* ─── TOPBAR ────────────────────────────────────────── */
    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 64px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: linear-gradient(180deg, rgba(12,11,8,0.97) 0%, rgba(12,11,8,0.0) 100%);
      pointer-events: none;
    }
    #topbar > * { pointer-events: all; }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .topbar-logo-icon {
      width: 36px; height: 36px;
    }
    .topbar-title-group {
      display: flex; flex-direction: column; line-height: 1;
    }
    .topbar-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.08em;
    }
    .topbar-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      color: var(--cream-dim);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .topbar-nav {
      display: flex;
      gap: 0.25rem;
    }
    .nav-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream-dim);
      background: transparent;
      border: 1px solid transparent;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .nav-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }
    .nav-btn:hover { color: var(--gold-light); }
    .nav-btn:hover::after { width: 80%; }
    .nav-btn.active { color: var(--gold); }
    .nav-btn.active::after { width: 80%; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px;
      padding: 0.35rem 0.75rem;
      transition: border-color 0.2s;
    }
    .search-wrap:focus-within { border-color: var(--gold); }
    .search-wrap input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--cream);
      width: 140px;
      letter-spacing: 0.1em;
    }
    .search-wrap input::placeholder { color: var(--cream-dim); }
    .search-icon { color: var(--gold-dim); font-size: 0.8rem; }

    /* ─── MAPA ──────────────────────────────────────────── */
    #map-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    #map {
      width: 100%;
      height: 100%;
      background: #0e0d0a;
    }

    /* ─── FILTROS FLOTANTES ─────────────────────────────── */
    #filters-panel {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      pointer-events: none;
    }
    #filters-panel > * { pointer-events: all; }

    .filter-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 1px solid;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      backdrop-filter: blur(8px);
    }
    .filter-btn .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    /* Categorías */
    .filter-btn[data-cat="all"] {
      background: rgba(201,168,76,0.15);
      border-color: var(--gold);
      color: var(--gold-light);
    }
    .filter-btn[data-cat="all"].active,
    .filter-btn[data-cat="all"]:hover {
      background: rgba(201,168,76,0.3);
    }
    .filter-btn[data-cat="cine"] {
      background: rgba(212,160,23,0.1); border-color: var(--cat-cine); color: var(--cat-cine);
    }
    .filter-btn[data-cat="cine"].active,
    .filter-btn[data-cat="cine"]:hover { background: rgba(212,160,23,0.25); }

    .filter-btn[data-cat="teatro"] {
      background: rgba(192,57,43,0.1); border-color: var(--cat-teatro); color: var(--cat-teatro);
    }
    .filter-btn[data-cat="teatro"].active,
    .filter-btn[data-cat="teatro"]:hover { background: rgba(192,57,43,0.25); }

    .filter-btn[data-cat="museo"] {
      background: rgba(36,113,163,0.1); border-color: var(--cat-museo); color: var(--cat-museo);
    }
    .filter-btn[data-cat="museo"].active,
    .filter-btn[data-cat="museo"]:hover { background: rgba(36,113,163,0.25); }

    .filter-btn[data-cat="galeria"] {
      background: rgba(108,52,131,0.1); border-color: var(--cat-galeria); color: var(--cat-galeria);
    }
    .filter-btn[data-cat="galeria"].active,
    .filter-btn[data-cat="galeria"]:hover { background: rgba(108,52,131,0.25); }

    .filter-btn[data-cat="danza"] {
      background: rgba(30,132,73,0.1); border-color: var(--cat-danza); color: var(--cat-danza);
    }
    .filter-btn[data-cat="danza"].active,
    .filter-btn[data-cat="danza"]:hover { background: rgba(30,132,73,0.25); }

    .filter-btn[data-cat="musica"] {
      background: rgba(211,84,0,0.1); border-color: var(--cat-musica); color: var(--cat-musica);
    }
    .filter-btn[data-cat="musica"].active,
    .filter-btn[data-cat="musica"]:hover { background: rgba(211,84,0,0.25); }

    /* ─── RUTAS ─────────────────────────────────────────── */
    #routes-panel {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 0.75rem;
      pointer-events: none;
    }
    #routes-panel > * { pointer-events: all; }

    .route-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      background: rgba(12,11,8,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--cream-dim);
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    .route-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(201,168,76,0.07));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .route-btn:hover::before { opacity: 1; }
    .route-btn:hover { border-color: var(--gold); color: var(--gold-light); }
    .route-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.12);
    }
    .route-icon { font-size: 1rem; }

    /* ─── PANEL LATERAL ─────────────────────────────────── */
    #side-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: var(--panel-w);
      height: 100%;
      z-index: 500;
      background: linear-gradient(180deg, rgba(22,18,10,0.98) 0%, rgba(15,12,7,0.98) 100%);
      border-left: 1px solid rgba(201,168,76,0.15);
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(.16,1,.3,1);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    #side-panel.open { transform: translateX(0); }
    #side-panel::-webkit-scrollbar { width: 4px; }
    #side-panel::-webkit-scrollbar-track { background: transparent; }
    #side-panel::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    .panel-close {
      position: absolute;
      top: 1rem; left: 1rem;
      width: 32px; height: 32px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
      z-index: 10;
    }
    .panel-close:hover { background: rgba(201,168,76,0.2); color: var(--gold); }

    .panel-hero {
      width: 100%;
      height: 220px;
      background: var(--parch-mid);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .panel-hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }
    .panel-hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(22,18,10,1) 0%, transparent 60%);
    }
    .panel-hero-cat {
      position: absolute;
      top: 3.5rem; right: 1.2rem;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border: 1px solid;
      border-radius: 2px;
    }

    .panel-body {
      padding: 1.5rem;
      flex: 1;
    }

    .panel-zone-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.4rem;
    }
    .panel-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.25rem;
      color: var(--gold-light);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    .panel-desc {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--cream-dim);
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .panel-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
      margin: 1.2rem 0;
    }

    .panel-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.8rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }
    .info-item {
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.1);
      padding: 0.6rem 0.8rem;
      border-radius: 2px;
    }
    .info-item-label {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.2rem;
    }
    .info-item-value {
      font-size: 0.8rem;
      color: var(--cream);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }
    .tag {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--cream-dim);
      border-radius: 2px;
    }

    .panel-special-box {
      background: linear-gradient(135deg, rgba(201,168,76,0.06), rgba(201,168,76,0.02));
      border: 1px solid rgba(201,168,76,0.2);
      border-left: 3px solid var(--gold);
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.85rem;
      font-style: italic;
      color: var(--cream-dim);
      line-height: 1.5;
    }

    .panel-cta-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }
    .cta-btn {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.7rem 1rem;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
    }
    .cta-primary {
      background: rgba(201,168,76,0.15);
      border-color: var(--gold);
      color: var(--gold-light);
    }
    .cta-primary:hover { background: rgba(201,168,76,0.28); }
    .cta-secondary {
      background: transparent;
      border-color: rgba(201,168,76,0.3);
      color: var(--cream-dim);
    }
    .cta-secondary:hover { border-color: var(--gold); color: var(--cream); }

    /* ─── LEYENDA ZONAS ─────────────────────────────────── */
    #zones-legend {
      position: absolute;
      bottom: 90px;
      left: 1.5rem;
      z-index: 1000;
      background: rgba(12,11,8,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(201,168,76,0.2);
      padding: 0.9rem 1.1rem;
      min-width: 170px;
    }
    .legend-title {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.6rem;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding-bottom: 0.4rem;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
    }

    /* ─── TOOLTIP FLOTANTE ──────────────────────────────── */
    .map-tooltip {
      background: rgba(12,11,8,0.92) !important;
      border: 1px solid rgba(201,168,76,0.4) !important;
      color: var(--cream) !important;
      font-family: 'Cinzel', serif !important;
      font-size: 0.65rem !important;
      letter-spacing: 0.1em !important;
      padding: 0.4rem 0.7rem !important;
      border-radius: 0 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
      white-space: nowrap;
    }
    .map-tooltip::before { display: none !important; }

    /* ─── ORNAMENTO ESQUINAS ─────────────────────────────── */
    .corner-ornament {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
      width: 60px; height: 60px;
      opacity: 0.35;
    }
    .corner-ornament.tl { top: 64px; left: 0; }
    .corner-ornament.tr { top: 64px; right: 0; transform: scaleX(-1); }
    .corner-ornament.bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner-ornament.br { bottom: 0; right: 0; transform: scale(-1); }

    /* ─── MARCADORES PERSONALIZADOS ─────────────────────── */
    .custom-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid rgba(0,0,0,0.4);
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .custom-marker:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
    }
    .custom-marker-inner {
      transform: rotate(45deg);
      font-size: 0.85rem;
      line-height: 1;
    }

    .zone-label-icon {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.08em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Leaflet overrides */
    .leaflet-container { background: #0e0d0a; cursor: crosshair; }
    .leaflet-control-zoom {
      border: 1px solid rgba(201,168,76,0.3) !important;
      border-radius: 0 !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: rgba(12,11,8,0.9) !important;
      color: var(--gold-dim) !important;
      border-bottom: 1px solid rgba(201,168,76,0.2) !important;
      font-size: 1.1rem !important;
      line-height: 28px !important;
      width: 28px !important;
      height: 28px !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(201,168,76,0.15) !important; color: var(--gold) !important; }
    .leaflet-control-attribution { display: none !important; }

    /* Overlay oscuro cuando panel abierto */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }

    /* Vignette borde */
    #vignette {
      position: absolute;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      box-shadow: inset 0 0 120px rgba(0,0,0,0.6);
    }

    /* Responsive mínimo */
    @media (max-width: 600px) {
      :root { --panel-w: 100vw; }
      #routes-panel { bottom: 20px; gap: 0.4rem; }
      .route-btn { padding: 0.4rem 0.8rem; font-size: 0.55rem; }
    }
  </style>
</head>
<body>

<!-- ═══ PANTALLA DE CARGA ══════════════════════════════════ -->
<div id="loading-screen">
  <div class="loading-emblem">
    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  museo:   '#2471a3',
  galeria: '#6c3483',
  danza:   '#1e8449',
  musica:  '#d35400',
};
const CAT_ICONS = {
  cine:    '🎬',
  teatro:  '🎭',
  museo:   '🏛️',
  galeria: '🖼️',
  danza:   '💃',
  musica:  '🎵',
};
const ZONE_COLORS = {
  'Chapinero':    '#c9a84c',
  'Usaquén':      '#2a7a6f',
  'La Candelaria':'#7a5f28',
  'Kennedy':      '#8b3a2a',
};

// ═══════════════════════════════════════════════════════════
// MAPA
// ═══════════════════════════════════════════════════════════
let map, markers = [], activeRoute = null, activeCategory = 'all';

function initMap() {
  map = L.map('map', {
    center: [4.6260, -74.0820],
    zoom: 13,
    zoomControl: false,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Etiquetas de zona
  addZoneLabels();

  // Marcadores
  renderMarkers(LUGARES);
}

function addZoneLabels() {
  const zones = [
    { name: 'Chapinero', lat: 4.6420, lng: -74.0650 },
    { name: 'Usaquén',   lat: 4.7050, lng: -74.0310 },
    { name: 'Kennedy',   lat: 4.6270, lng: -74.1450 },
    { name: 'La Candelaria', lat: 4.5960, lng: -74.0730 },
  ];
  zones.forEach(z => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="zone-label-icon">${z.name.toUpperCase()}</div>`,
      iconSize: [120, 20],
      iconAnchor: [60, 10],
    });
    L.marker([z.lat, z.lng], { icon, interactive: false, zIndexOffset: -1000 }).addTo(map);
  });
}

function createMarkerIcon(lugar) {
  const color = CAT_COLORS[lugar.categoria] || '#999';
  const icon  = CAT_ICONS[lugar.categoria] || '📍';
  const size  = 36;
  return L.divIcon({
    className: '',
    html: `
      <div class="custom-marker" style="
        width:${size}px; height:${size}px;
        background:${color};
        transform: rotate(-45deg);
      ">
        <div class="custom-marker-inner">${icon}</div>
      </div>`,
    iconSize:   [size, size],
    iconAnchor: [size/2, size],
    popupAnchor:[0, -size],
  });
}

function renderMarkers(list) {
  // Limpiar
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  list.forEach(lugar => {
    const m = L.marker([lugar.lat, lugar.lng], { icon: createMarkerIcon(lugar) });
    m.bindTooltip(lugar.nombre, {
      className: 'map-tooltip',
      direction: 'top',
      offset: [0, -38],
    });
    m.on('click', () => openPanel(lugar));
    m.addTo(map);
    markers.push({ lugar, marker: m });
  });
}

// ═══════════════════════════════════════════════════════════
// PANEL LATERAL
// ═══════════════════════════════════════════════════════════
function openPanel(lugar) {
  const color = CAT_COLORS[lugar.categoria] || '#999';
  const icon  = CAT_ICONS[lugar.categoria]  || '📍';

  document.getElementById('panel-img').src = lugar.imagen;
  document.getElementById('panel-img').alt = lugar.nombre;

  const badge = document.getElementById('panel-cat-badge');
  badge.textContent = icon + ' ' + lugar.categoria.toUpperCase();
  badge.style.color       = color;
  badge.style.borderColor = color;
  badge.style.background  = hexToRgba(color, 0.15);

  document.getElementById('panel-zone').textContent = lugar.zona.toUpperCase() + ' ·  BOGOTÁ';
  document.getElementById('panel-name').textContent = lugar.nombre;
  document.getElementById('panel-desc').textContent = lugar.desc;
  document.getElementById('panel-special').textContent = lugar.especial;

  // Info grid
  const grid = document.getElementById('panel-info-grid');
  grid.innerHTML = [
    ['Horarios', lugar.horarios],
    ['Acceso',   lugar.acceso],
    ['Precio',   lugar.precio],
    ['Contacto', lugar.telefono],
  ].map(([l,v]) => `
    <div class="info-item">
      <div class="info-item-label">${l}</div>
      <div class="info-item-value">${v}</div>
    </div>
  `).join('');

  // Tags
  const tagsEl = document.getElementById('panel-tags');
  tagsEl.innerHTML = lugar.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // CTAs
  document.getElementById('panel-gmaps').href = lugar.gmaps;
  document.getElementById('panel-web').href   = lugar.web;

  document.getElementById('side-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════════════════
function filterCat(cat, btn) {
  activeCategory = cat;
  activeRoute    = null;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  applyFilters();
}

function activateRoute(route, btn) {
  if (activeRoute === route) {
    activeRoute = null;
    btn.classList.remove('active');
  } else {
    activeRoute = route;
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Quitar filtro de categoría al seleccionar ruta
    activeCategory = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
  }
  applyFilters();
}

function filterSearch(q) {
  const term = q.toLowerCase().trim();
  const filtered = LUGARES.filter(l =>
    !term ||
    l.nombre.toLowerCase().includes(term) ||
    l.zona.toLowerCase().includes(term) ||
    l.tags.some(t => t.toLowerCase().includes(term))
  );
  renderMarkers(filtered);
}

function applyFilters() {
  let filtered = LUGARES;
  if (activeCategory !== 'all') {
    filtered = filtered.filter(l => l.categoria === activeCategory);
  }
  if (activeRoute) {
    filtered = filtered.filter(l => l.rutas.includes(activeRoute));
  }
  renderMarkers(filtered);

  // Zoom a resultados
  if (filtered.length > 0 && filtered.length < LUGARES.length) {
    const bounds = L.latLngBounds(filtered.map(l => [l.lat, l.lng]));
    map.fitBounds(bounds.pad(0.3));
  }
}

// ═══════════════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════════════
function setView(view) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // Aquí se expandirán las vistas en iteraciones futuras
}

// ═══════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ═══════════════════════════════════════════════════════════
// INICIALIZACIÓN
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Barra de carga animada
  const bar = document.getElementById('loading-bar');
  setTimeout(() => { bar.style.width = '60%'; }, 100);
  setTimeout(() => { bar.style.width = '90%'; }, 600);

  initMap();

  setTimeout(() => {
    bar.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
    }, 400);
  }, 1200);
});
</script>
</body>
